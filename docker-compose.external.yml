# ==============================================================================
# ZTRACK API - Redis y MongoDB EXTERNOS (todo fuera de Docker salvo api/batch)
#
# Uso: docker compose -f docker-compose.external.yml up -d --build
#
# En .env (sin credenciales en este archivo):
#   # Mongo principal en el mismo servidor (localhost del host)
#   MONGO_DETAILS_OK=mongodb://usuario:pass@host.docker.internal:27017/?authSource=admin
#   BD_DETAILS_OK=ztrack_db
#
#   # Respaldo por enlace (otro servidor, Atlas, etc.)
#   MONGO_BACKUP_URI=mongodb+srv://user:pass@cluster.mongodb.net/
#   MONGO_BACKUP_DB=ztrack_backup
#
#   REDIS_HOST=host.docker.internal
#   REDIS_PORT=6379
#
# Si Mongo escucha solo en 127.0.0.1 del host, host.docker.internal suele funcionar
# con extra_hosts (Linux). Alternativa: IP del servidor en la LAN.
# ==============================================================================

services:
  api:
    build: .
    container_name: ztrack_api
    env_file: .env
    ports:
      - "9050:9050"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: ${APP_ENV:-production}
      MONGO_DETAILS_OK: ${MONGO_DETAILS_OK:?Definir MONGO_DETAILS_OK en .env}
      BD_DETAILS_OK: ${BD_DETAILS_OK:-ztrack_db}
      MONGO_BACKUP_URI: ${MONGO_BACKUP_URI:-}
      MONGO_BACKUP_DB: ${MONGO_BACKUP_DB:-}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9050/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  batch:
    build: .
    container_name: ztrack_batch
    env_file: .env
    command: ["python", "-m", "app.workers.batch_writer"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: ${APP_ENV:-production}
      MONGO_DETAILS_OK: ${MONGO_DETAILS_OK:?Definir MONGO_DETAILS_OK en .env}
      BD_DETAILS_OK: ${BD_DETAILS_OK:-ztrack_db}
      MONGO_BACKUP_URI: ${MONGO_BACKUP_URI:-}
      MONGO_BACKUP_DB: ${MONGO_BACKUP_DB:-}
      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
    restart: unless-stopped
