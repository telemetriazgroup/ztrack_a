# ==============================================================================
# ZTRACK API - Docker Compose
#
# MongoDB PRINCIPAL: en el servidor (ya instalado), no en contenedor.
#   En .env apunta MONGO_DETAILS_OK al host donde escucha Mongo, p. ej.:
#     mongodb://usuario:pass@host.docker.internal:27017/?authSource=admin
#     mongodb://172.17.0.1:27017   (puente Docker en Linux, si aplica)
#     mongodb://IP_LAN_DEL_SERVIDOR:27017
#
# MongoDB RESPALDO (opcional): otra instancia o Atlas; URI completa en .env:
#     MONGO_BACKUP_URI=mongodb+srv://... o mongodb://host:27017
#     MONGO_BACKUP_DB=nombre_bd   (vacío = mismo que BD_DETAILS_OK)
#
# Redis: servicio interno; puerto 6380 en el host (evita conflicto con Redis local).
#
# Requisito: .env con al menos MONGO_DETAILS_OK y BD_DETAILS_OK
#   cp .env.example .env && nano .env
# ==============================================================================

services:
  api:
    build: .
    container_name: ztrack_api
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "9050:9050"
    extra_hosts:
      # Permite alcanzar MongoDB en el host Linux/WSL desde el contenedor
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: ${APP_ENV:-development}
      ENABLE_DOCS: ${ENABLE_DOCS:-false}
      MONGO_DETAILS_OK: ${MONGO_DETAILS_OK:?Definir MONGO_DETAILS_OK en .env (Mongo en el servidor)}
      BD_DETAILS_OK: ${BD_DETAILS_OK:-ztrack_db}
      MONGO_BACKUP_URI: ${MONGO_BACKUP_URI:-}
      MONGO_BACKUP_DB: ${MONGO_BACKUP_DB:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9050/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  batch:
    build: .
    container_name: ztrack_batch
    env_file: .env
    command: ["python", "-m", "app.workers.batch_writer"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: ${APP_ENV:-production}
      MONGO_DETAILS_OK: ${MONGO_DETAILS_OK:?Definir MONGO_DETAILS_OK en .env}
      BD_DETAILS_OK: ${BD_DETAILS_OK:-ztrack_db}
      MONGO_BACKUP_URI: ${MONGO_BACKUP_URI:-}
      MONGO_BACKUP_DB: ${MONGO_BACKUP_DB:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ztrack_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  redis_data:
