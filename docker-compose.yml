# ==============================================================================
# ZTRACK API - Docker Compose (Redis incluido en el mismo compose)
#
# MongoDB PRINCIPAL en el HOST (instalación local, ej. mongodb://localhost:27017 en el SO):
#   Desde los contenedores NO uses "localhost" para Mongo: apunta al host con
#   host.docker.internal (ver extra_hosts abajo). Valor por defecto en compose:
#     MONGO_DETAILS_OK=mongodb://host.docker.internal:27017
#   Equivale a tu Mongo escuchando en el puerto 27017 de la máquina.
#
#   Si mongod solo escucha en 127.0.0.1, hay que permitir el bridge Docker, p. ej. en
#   mongod.conf:  net.bindIp: 127.0.0.1,172.17.0.1  o 0.0.0.0
#
# Mongo RESPALDO (opcional, URI externa): si no responde en ~2s al arrancar, se ignora.
#
# Requisito: archivo .env (puede estar vacío de Mongo si aceptas el default de compose)
#   cp .env.example .env
# ==============================================================================

services:
  api:
    build: .
    container_name: ztrack_api
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "9050:9050"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCKER_ENV: "1"
      APP_ENV: ${APP_ENV:-development}
      ENABLE_DOCS: ${ENABLE_DOCS:-false}
      # localhost en .env se reescribe en la app a host.docker.internal; default explícito:
      MONGO_DETAILS_OK: ${MONGO_DETAILS_OK:-mongodb://host.docker.internal:27017}
      BD_DETAILS_OK: ${BD_DETAILS_OK:-ztrack_db}
      MONGO_BACKUP_URI: ${MONGO_BACKUP_URI:-}
      MONGO_BACKUP_DB: ${MONGO_BACKUP_DB:-}
      MONGO_BACKUP_CONNECT_TIMEOUT_MS: ${MONGO_BACKUP_CONNECT_TIMEOUT_MS:-2000}
      MONGO_BACKUP_SERVER_SELECTION_TIMEOUT_MS: ${MONGO_BACKUP_SERVER_SELECTION_TIMEOUT_MS:-2000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9050/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  batch:
    build: .
    container_name: ztrack_batch
    env_file: .env
    command: ["python", "-m", "app.workers.batch_writer"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCKER_ENV: "1"
      APP_ENV: ${APP_ENV:-production}
      MONGO_DETAILS_OK: ${MONGO_DETAILS_OK:-mongodb://host.docker.internal:27017}
      BD_DETAILS_OK: ${BD_DETAILS_OK:-ztrack_db}
      MONGO_BACKUP_URI: ${MONGO_BACKUP_URI:-}
      MONGO_BACKUP_DB: ${MONGO_BACKUP_DB:-}
      MONGO_BACKUP_CONNECT_TIMEOUT_MS: ${MONGO_BACKUP_CONNECT_TIMEOUT_MS:-2000}
      MONGO_BACKUP_SERVER_SELECTION_TIMEOUT_MS: ${MONGO_BACKUP_SERVER_SELECTION_TIMEOUT_MS:-2000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ztrack_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  redis_data:
